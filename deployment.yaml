apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-java-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-java-app
  template:
    metadata:
      labels:
        app: sample-java-app
    spec:
      containers:
      - name: java-app
        image: docker.io/YOUR_DOCKERHUB_USERNAME/poc3-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sample-java-service
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: sample-java-app
